title: Snap-to-3D
description: "From multi-view photos to a 3D mesh: YOLO26 segmentation + VGGT-Omega reconstruction"
theme: jekyll-theme-cayman

# GitHub Pages renders README.md as the site index (jekyll-readme-index) and
# turns relative .md links into pages (jekyll-relative-links), so API_SPEC.md
# stays reachable. Keep datasets, weights and code out of the published site.
exclude:
  - "data/"
  - "data_yolo/"
  - "checkpoints/"
  - "runs/"
  - "project_venv/"
  - "venv/"
  - "**/*.py"
  - "**/*.pt"
  - "*.png"
  - "requirements*.txt"
  - "report.md"
